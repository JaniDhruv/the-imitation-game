<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- CRT monitor body -->
  <rect x="4" y="4" width="40" height="32" rx="3" fill="#1a1a1a" stroke="#33ff00" stroke-width="1.5"/>
  <!-- Screen inner bezel -->
  <rect x="7" y="7" width="34" height="26" rx="1.5" fill="#0a0f0a"/>
  <!-- Scanline effect -->
  <line x1="7" y1="11" x2="41" y2="11" stroke="#33ff00" stroke-width="0.3" opacity="0.15"/>
  <line x1="7" y1="15" x2="41" y2="15" stroke="#33ff00" stroke-width="0.3" opacity="0.15"/>
  <line x1="7" y1="19" x2="41" y2="19" stroke="#33ff00" stroke-width="0.3" opacity="0.15"/>
  <line x1="7" y1="23" x2="41" y2="23" stroke="#33ff00" stroke-width="0.3" opacity="0.15"/>
  <line x1="7" y1="27" x2="41" y2="27" stroke="#33ff00" stroke-width="0.3" opacity="0.15"/>
  <!-- Question mark — the core symbol -->
  <text x="24" y="28" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22" fill="#33ff00" opacity="0.9">?</text>
  <!-- Phosphor glow on question mark -->
  <text x="24" y="28" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22" fill="#33ff00" filter="url(#glow)">?</text>
  <!-- Human silhouette (left) -->
  <circle cx="14" cy="16" r="2.5" fill="#33ff00" opacity="0.4"/>
  <path d="M10 24 Q14 20 18 24" fill="#33ff00" opacity="0.3"/>
  <!-- Robot/AI silhouette (right) -->
  <rect x="30" y="13.5" width="5" height="5" rx="0.5" fill="#33ff00" opacity="0.4"/>
  <circle cx="31.5" cy="15.5" r="0.8" fill="#0a0f0a"/>
  <circle cx="33.5" cy="15.5" r="0.8" fill="#0a0f0a"/>
  <line x1="30.5" y1="19.5" x2="34.5" y2="19.5" stroke="#33ff00" stroke-width="0.6" opacity="0.4"/>
  <!-- Monitor stand -->
  <rect x="19" y="36" width="10" height="3" fill="#1a1a1a" stroke="#33ff00" stroke-width="0.8"/>
  <rect x="16" y="39" width="16" height="2" rx="1" fill="#1a1a1a" stroke="#33ff00" stroke-width="0.8"/>
  <!-- Screen edge glow -->
  <rect x="7" y="7" width="34" height="26" rx="1.5" fill="none" stroke="#33ff00" stroke-width="0.5" opacity="0.3"/>
  <!-- Glow filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>